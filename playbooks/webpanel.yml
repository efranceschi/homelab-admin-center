---
# Parametric playbook used ONLY by the web control panel (webpanel/).
# It mirrors site.yml's role/tag structure but is fully decoupled from the
# daily cron run: the panel selects functionality with --tags, targets hosts
# with --limit, and layers configuration via --extra-vars. site.yml is never
# touched, so the cron path keeps working unchanged.
- name: lxc-ansible web panel run
  hosts: all
  gather_facts: true
  become: false # pct exec is already root; ssh/local can opt in via become if needed.
  serial: "{{ panel_serial | default('100%') }}"

  roles:
    - role: common_timezone
      tags: [timezone]
    - role: ssh_baseline
      tags: [ssh]
    - role: authentik_sssd
      tags: [auth, sssd]
      when: authentik_sssd_enabled | default(false) | bool
    - role: apt_maintenance
      tags: [apt, updates]

  post_tasks:
    # `always` so the panel captures the live hostname on every run regardless of
    # which --tags were selected; `facts` lets the inventory probe run this alone
    # (--tags facts skips the roles). Parsed by ansible_layer/results.parse_hostnames.
    - name: Report OS hostname (panel facts probe)
      ansible.builtin.debug:
        msg: >-
          PANEL_HOSTNAME {{ inventory_hostname }} ::
          {{ ansible_hostname | default('') }} ::
          {{ ansible_fqdn | default('') }}
      tags: [facts, always]

    # Curated, STABLE facts for the per-host inventory (panel Inventory tab).
    # Assembled here so cpu_model/disk_mounts can use loop/regex helpers, then
    # base64-encoded below to survive debug's line-wrapping/ANSI. Volatile facts
    # (uptime, free mem, available disk, load, current time) are deliberately
    # excluded so change-tracking only fires on real changes.
    - name: Assemble panel inventory facts
      ansible.builtin.set_fact:
        _panel_inv:
          hostname: "{{ ansible_hostname | default('') }}"
          fqdn: "{{ ansible_fqdn | default('') }}"
          distribution: "{{ ansible_distribution | default('') }}"
          distribution_version: "{{ ansible_distribution_version | default('') }}"
          distribution_release: "{{ ansible_distribution_release | default('') }}"
          kernel: "{{ ansible_kernel | default('') }}"
          architecture: "{{ ansible_architecture | default('') }}"
          vcpus: "{{ ansible_processor_vcpus | default('') }}"
          memtotal_mb: "{{ ansible_memtotal_mb | default('') }}"
          virtualization_type: "{{ ansible_virtualization_type | default('') }}"
          virtualization_role: "{{ ansible_virtualization_role | default('') }}"
          python_version: "{{ ansible_python_version | default('') }}"
          pkg_mgr: "{{ ansible_pkg_mgr | default('') }}"
          timezone: "{{ ansible_date_time.tz | default('') }}"
          default_ipv4: "{{ ansible_default_ipv4.address | default('') }}"
          macaddress: "{{ ansible_default_ipv4.macaddress | default('') }}"
          all_ipv4: "{{ ansible_all_ipv4_addresses | default([]) | sort | join(', ') }}"
          # Pick the processor element that looks like a model name (contains a
          # space); index of the model varies across Ansible/virt types.
          cpu_model: >-
            {{ (ansible_processor | default([]) | select('search', ' ') | list | first)
               | default(ansible_processor | default([]) | join(' '), true) | trim }}
          # Per-mount provisioned size only (size_total); size_available is volatile.
          disk_mounts: >-
            {% for m in ansible_mounts | default([]) | sort(attribute='mount')
            -%}{{ m.mount }} ({{ (m.size_total / 1073741824) | round(1) }} GB)
            {%- if not loop.last %}, {% endif %}{% endfor %}
      tags: [facts, always]

    - name: Report inventory facts (panel facts probe)
      ansible.builtin.debug:
        msg: "PANEL_FACTS {{ inventory_hostname }} :: {{ _panel_inv | to_json | b64encode }}"
      tags: [facts, always]

    # Read-only Docker probe for the Hosts tree: list the host's containers so
    # the panel can show them as display-only children (NOT Ansible-managed).
    # `check_mode: false` is required — the inventory probe runs under --check,
    # which skips shell/command tasks by default; this command is read-only so
    # it is safe to force. A `__DOCKER_PRESENT__` sentinel distinguishes "docker
    # absent" (no marker) from "docker present, zero containers" (empty payload).
    - name: Probe docker containers (panel docker probe)
      ansible.builtin.shell: |
        command -v docker >/dev/null 2>&1 || exit 0
        echo __DOCKER_PRESENT__
        docker ps -a --no-trunc --format '{{ '{{json .}}' }}' 2>/dev/null || true
      args:
        executable: /bin/sh
      register: _panel_docker
      changed_when: false
      check_mode: false
      failed_when: false
      tags: [facts, always]

    - name: Report docker containers (panel docker probe)
      ansible.builtin.debug:
        msg: "PANEL_DOCKER {{ inventory_hostname }} :: {{ _panel_docker.stdout | default('') | b64encode }}"
      when: "'__DOCKER_PRESENT__' in (_panel_docker.stdout | default(''))"
      tags: [facts, always]

    - name: Detect reboot requirement
      ansible.builtin.stat:
        path: /var/run/reboot-required
      register: panel_reboot_required

    - name: Reboot-required summary
      ansible.builtin.debug:
        msg: >-
          {{ inventory_hostname }}:
          {{ 'REBOOT REQUIRED (not rebooted by policy)'
             if panel_reboot_required.stat.exists
             else 'no reboot pending' }}
