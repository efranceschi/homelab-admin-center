---
# Master playbook: standardizes every running LXC container.
# Run by run.sh (daily via cron.d). Idempotent.
- name: Standardize LXC containers
  hosts: running
  gather_facts: true
  become: false # pct exec already enters as root in the container
  serial: "50%" # process in two waves to limit simultaneous impact

  roles:
    - role: common_timezone
      tags: [timezone]
    - role: ssh_baseline
      tags: [ssh]
    - role: authentik_sssd
      tags: [auth, sssd]
      when: authentik_sssd_enabled | bool
    - role: apt_maintenance
      tags: [apt, updates]

  post_tasks:
    - name: Detect reboot requirement
      ansible.builtin.stat:
        path: /var/run/reboot-required
      register: reboot_required_file

    # The panel parses this line: it must start with "<host>:" and contain
    # "REBOOT REQUIRED" for parse_reboot() to flag the host.
    - name: Summary — reboot required?
      ansible.builtin.debug:
        msg: >-
          {{ inventory_hostname }}:
          {{ 'REBOOT REQUIRED (not rebooted by policy)'
             if reboot_required_file.stat.exists
             else 'no reboot pending' }}
          ({{ pct_ostype | default('?') }})
