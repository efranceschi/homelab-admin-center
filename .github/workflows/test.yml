name: test

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    name: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: |
            webpanel/requirements-web.txt
            webpanel/requirements-test.txt

      - name: Install test dependencies
        run: pip install -r webpanel/requirements-test.txt

      - name: Run pytest with coverage
        # Coverage source, reports, and the --cov-fail-under gate are configured
        # in pyproject.toml [tool.pytest.ini_options].
        run: pytest

      - name: Upload coverage reports
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: coverage
          path: |
            coverage.xml
            htmlcov/
          retention-days: 14
