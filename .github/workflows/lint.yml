name: lint

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  lint:
    name: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: pip

      - name: Install lint tools
        run: pip install ruff yamllint "ansible-lint>=24" "ansible-core>=2.18,<2.19"

      - name: ruff (lint)
        run: ruff check .

      - name: ruff (format check — test code)
        run: ruff format --check webpanel/tests tests

      - name: yamllint
        run: yamllint -c .yamllint roles playbooks inventory .github

      - name: ansible-lint
        env:
          # ansible.cfg points vault_password_file at /etc/hac/vault-pass, which
          # only exists on deployed hosts. ansible-lint runs --syntax-check, which
          # requires the password file to *exist* but does not decrypt group_vars,
          # so point it at a throwaway file in the runner temp dir.
          ANSIBLE_VAULT_PASSWORD_FILE: ${{ runner.temp }}/ci-vault-pass
        run: |
          echo ci > "${ANSIBLE_VAULT_PASSWORD_FILE}"
          ansible-lint

      - name: shellcheck
        run: shellcheck run.sh install.sh webpanel/run-panel.sh webpanel/install-service.sh
