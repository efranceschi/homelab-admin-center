# ============================================================================
# SECONDARY / FUTURE PATH — Proxmox API discovery + SSH connection.
# NOT used by default (ansible.cfg points at inventory/pct.py).
# Copy to `proxmox.yml`, then point `inventory` in ansible.cfg here and make
# sure the host SSH key is distributed (the ssh_baseline role does this).
#
# Requires a Proxmox API token. Create it under
# Datacenter > Permissions > API Tokens and export before running:
#   PROXMOX_URL, PROXMOX_USER, PROXMOX_TOKEN_ID, PROXMOX_TOKEN_SECRET
# ============================================================================
plugin: community.general.proxmox
url: "{{ lookup('ansible.builtin.env', 'PROXMOX_URL') | default('https://proxmox.example.lan:8006', true) }}"
user: "{{ lookup('ansible.builtin.env', 'PROXMOX_USER') | default('root@pam', true) }}"
token_id: "{{ lookup('ansible.builtin.env', 'PROXMOX_TOKEN_ID') }}"
token_secret: "{{ lookup('ansible.builtin.env', 'PROXMOX_TOKEN_SECRET') }}"
validate_certs: false
want_facts: true
# Only running LXC containers.
filters:
  - "proxmox_type == 'lxc'"
  - "proxmox_status == 'running'"
# Connect over SSH using the container's network config IP.
compose:
  ansible_host: proxmox_net0.ip | default(proxmox_agent_interfaces[0].ip_addresses[0]) | regex_replace('/.*$', '')
  ansible_connection: "'ssh'"
  ansible_user: "'root'"
groups:
  running: "proxmox_status == 'running'"
