# Configuração local do projeto lxc-ansible.
# Tudo relativo a /opt/hac para ser versionável e auto-contido.
[defaults]
inventory            = inventory/pct.py
roles_path           = roles
collections_path     = collections
# Plugin de conexão vendorizado (pct exec/push/pull) — caminho PRIMÁRIO.
connection_plugins   = plugins/connection
vault_password_file  = /etc/hac/vault-pass
host_key_checking    = False
interpreter_python   = /usr/bin/python3
stdout_callback      = ansible.builtin.default
result_format        = yaml
# bin_ansible_callbacks habilita o callback bonito também em ad-hoc.
bin_ansible_callbacks = True
retry_files_enabled  = False
forks                = 8
# Mostra task skip/ok de forma enxuta
display_skipped_hosts = False
nocows               = True

[inventory]
# inventário dinâmico pct.py é executável; nenhum plugin de inventário necessário.

[ssh_connection]
# Relevante apenas para o caminho SECUNDÁRIO (SSH/inventário proxmox).
pipelining = True
ssh_args   = -o ControlMaster=auto -o ControlPersist=60s -o StrictHostKeyChecking=no
