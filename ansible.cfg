# Local configuration for the hack project.
# Everything relative to /opt/hack so it is versionable and self-contained.
[defaults]
inventory            = inventory/pct.py
roles_path           = roles
collections_path     = collections
# Vendored connection plugin (pct exec/push/pull) — PRIMARY path.
connection_plugins   = plugins/connection
vault_password_file  = /etc/hack/vault-pass
host_key_checking    = False
interpreter_python   = /usr/bin/python3
stdout_callback      = ansible.builtin.default
result_format        = yaml
# bin_ansible_callbacks enables the pretty callback for ad-hoc runs too.
bin_ansible_callbacks = True
retry_files_enabled  = False
forks                = 8
# Show task skip/ok concisely
display_skipped_hosts = False
nocows               = True

[inventory]
# the pct.py dynamic inventory is executable; no inventory plugin needed.

[ssh_connection]
# Relevant only for the SECONDARY path (SSH/proxmox inventory).
pipelining = True
ssh_args   = -o ControlMaster=auto -o ControlPersist=60s -o StrictHostKeyChecking=no
