<!doctype html>
{# Standalone interactive console page (NOT the app shell). Loaded by the tab the
   Hosts tree opens; it connects a WebSocket to /console/ws/{token} and wires
   xterm.js to it. Closing the tab ends the session. #}
<html lang="en" data-theme="dark" data-bs-theme="dark">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ title }} · console</title>
  <link rel="icon" type="image/svg+xml" href="/static/img/favicon.svg">
  <link rel="stylesheet" href="/static/css/panel.css?v={{ static_version }}">
  <link rel="stylesheet" href="/static/css/xterm.css?v={{ static_version }}">
  <script src="/static/js/xterm.js?v={{ static_version }}"></script>
  <script src="/static/js/xterm-addon-fit.js?v={{ static_version }}"></script>
  <script src="/static/js/xterm-addon-web-links.js?v={{ static_version }}"></script>
  <style>
    html, body { height: 100%; margin: 0; background: #0b0e14; }
    .con-wrap { display: flex; flex-direction: column; height: 100vh; }
    .con-bar {
      display: flex; align-items: center; gap: .6rem;
      padding: .35rem .7rem; background: #11151f; color: #c8d0e0;
      font: 600 13px/1.4 'JetBrains Mono', ui-monospace, monospace;
      border-bottom: 1px solid #222a3a; flex: 0 0 auto;
    }
    .con-bar .dot { width: 9px; height: 9px; border-radius: 50%; background: #888; flex: 0 0 auto; }
    .con-bar .dot.ok { background: #2ecc71; } .con-bar .dot.off { background: #e74c3c; }
    .con-host { flex: 1 1 auto; min-height: 0; background: #000; }
    #term { width: 100%; height: 100%; }
  </style>
</head>
<body>
  <div class="con-wrap">
    <div class="con-bar">
      <span class="dot" id="dot"></span>
      <span id="bar-title">{{ title }}</span>
    </div>
    <div class="con-host"><div id="term"></div></div>
  </div>

  <script>
  (function () {
    const TOKEN = {{ token | tojson }};
    const wsUrl = (location.protocol === 'https:' ? 'wss://' : 'ws://')
                + location.host + '/console/ws/' + TOKEN;

    const term = new Terminal({
      cursorBlink: true,
      fontFamily: "'JetBrains Mono', ui-monospace, monospace",
      fontSize: 13,
      theme: { background: '#000000', foreground: '#d5dae6' },
      scrollback: 5000,
    });
    const fit = new FitAddon.FitAddon();
    term.loadAddon(fit);
    term.loadAddon(new WebLinksAddon.WebLinksAddon());

    const host = document.getElementById('term');
    term.open(host);
    fit.fit();

    const ws = new WebSocket(wsUrl);
    ws.binaryType = 'arraybuffer';
    const dot = document.getElementById('dot');
    const enc = new TextEncoder();

    function sendResize() {
      if (ws.readyState !== WebSocket.OPEN) return;
      ws.send(JSON.stringify({ type: 'resize', rows: term.rows, cols: term.cols }));
    }

    ws.onopen = () => { dot.classList.add('ok'); sendResize(); term.focus(); };
    ws.onmessage = (ev) => { term.write(new Uint8Array(ev.data)); };
    ws.onclose = () => {
      dot.classList.remove('ok'); dot.classList.add('off');
      term.write('\r\n\x1b[2m[connection closed]\x1b[0m\r\n');
    };
    term.onData((d) => { if (ws.readyState === WebSocket.OPEN) ws.send(enc.encode(d)); });

    // Refit on any size change of the terminal's container.
    const ro = new ResizeObserver(() => { try { fit.fit(); } catch (e) {} sendResize(); });
    ro.observe(host.parentElement);

    window.addEventListener('beforeunload', () => { try { ws.close(); } catch (e) {} });
  })();
  </script>
</body>
</html>
