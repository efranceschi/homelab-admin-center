{% extends "base.html" %}
{% block title %}{{ title }} · {{ app_name }}{% endblock %}
{% block content %}
<h4 class="mb-3">{{ title }}</h4>
<div class="alert alert-info">{{ note }}</div>
{% if output %}<pre class="log-view" style="height:40vh">{{ output }}</pre>{% endif %}
<p class="text-muted">The panel will be unavailable for a few seconds while it restarts.</p>
<script>setTimeout(() => location.href = "/dashboard", 6000);</script>
<a class="btn btn-secondary" href="/dashboard">Back to dashboard</a>
{% endblock %}
