{% extends "base.html" %}
{% block content %}
<div class="setup-wrap">
  <h3 class="mb-1"><span class="login-prompt">&gt;_</span> {{ app_name }}</h3>
  <p class="text-muted">Create the first administrator account.</p>
  {% if error %}<div class="alert alert-danger py-2">{{ error }}</div>{% endif %}
  <form method="post" action="/setup">
    <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
    <div class="mb-3">
      <label class="form-label">Admin username</label>
      <input class="form-control" name="username" autofocus required>
    </div>
    <div class="mb-3">
      <label class="form-label">Password (min 8 chars)</label>
      <input class="form-control" type="password" name="password" minlength="8" required>
    </div>
    <div class="mb-3">
      <label class="form-label">Confirm password</label>
      <input class="form-control" type="password" name="password2" minlength="8" required>
    </div>
    <button class="btn btn-success w-100" type="submit">Create admin &amp; continue</button>
  </form>
</div>
{% endblock %}
