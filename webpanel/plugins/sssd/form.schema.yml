# UI form fields -> Ansible variables consumed by the authentik_sssd role.
# Non-secret parameters live here; bind DN/password and the CA cert are secrets
# routed to the Ansible vault (see secret_fields).
fields:
  - var: authentik_sssd_enabled
    label: "Enable SSSD integration"
    type: bool
    default: false
    help: "Keep OFF until bind credentials are configured."
  - var: authentik_sssd_domain
    label: "SSSD domain label"
    type: string
    default: "authentik"
  - var: authentik_ldap_tls_mode
    label: "TLS mode"
    type: select
    choices: ["ldaps", "start_tls", "false"]
    default: "ldaps"
  - var: authentik_ldap_uri
    label: "LDAP URI"
    type: string
    default: "ldaps://authentik-ldap.lan:636"
    help: "Authentik LDAP outpost endpoint. Use ldaps:// when TLS mode is ldaps."
  - var: authentik_ldap_base_dn
    label: "Base DN (search base)"
    type: string
    default: "dc=ldap,dc=goauthentik,dc=io"
    help: "Outpost base DN, e.g. dc=ldap,dc=goauthentik,dc=io."
  - var: authentik_ldap_hosts_entry
    label: "/etc/hosts entry for the LDAP host"
    type: string
    default: "192.168.68.105 authentik-ldap.lan"
    help: "Maps the cert SAN hostname to the outpost IP for TLS verification."
  - var: authentik_ldap_user_name_attr
    label: "User name attribute"
    type: string
    default: "cn"
  - var: authentik_default_shell
    label: "Default shell"
    type: string
    default: "/bin/bash"
  - var: authentik_fallback_homedir
    label: "Fallback home directory"
    type: string
    default: "/home/%u"
secret_fields:
  - var: authentik_ldap_bind_password
    label: "LDAP bind password"
    type: password
  - var: authentik_ldap_bind_dn
    label: "LDAP bind DN"
    type: password
  - var: authentik_ldap_ca_cert
    label: "Outpost CA certificate (PEM)"
    type: textarea
