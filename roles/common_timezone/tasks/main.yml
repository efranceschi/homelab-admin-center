---
# Define o timezone de forma idempotente. Em LXC unprivileged o timedatectl
# costuma falhar (sem acesso ao RTC/clock do host), então usamos o método de
# arquivos como fonte da verdade e ajustamos a tzdata.
- name: Instalar tzdata
  ansible.builtin.apt:
    name: tzdata
    state: present
    update_cache: true
    cache_valid_time: 3600
  register: tzdata_install
  failed_when: false

- name: Definir /etc/timezone
  ansible.builtin.copy:
    content: "{{ common_timezone }}\n"
    dest: /etc/timezone
    owner: root
    group: root
    mode: "0644"
  notify: reconfigurar tzdata

- name: Apontar /etc/localtime para a zona correta
  ansible.builtin.file:
    src: "/usr/share/zoneinfo/{{ common_timezone }}"
    dest: /etc/localtime
    state: link
    force: true
  notify: reconfigurar tzdata

- name: Tentar aplicar via timedatectl (no-op em unprivileged)
  ansible.builtin.command:
    cmd: "timedatectl set-timezone {{ common_timezone }}"
  changed_when: false
  failed_when: false
