---
# Set the timezone idempotently. On unprivileged LXC, timedatectl usually fails
# (no access to the host RTC/clock), so we use the file-based method as the
# source of truth and adjust tzdata.
- name: Install tzdata
  ansible.builtin.apt:
    name: tzdata
    state: present
    update_cache: true
    cache_valid_time: 3600
  register: tzdata_install
  failed_when: false

- name: Set /etc/timezone
  ansible.builtin.copy:
    content: "{{ common_timezone }}\n"
    dest: /etc/timezone
    owner: root
    group: root
    mode: "0644"
  notify: reconfigure tzdata

- name: Point /etc/localtime to the correct zone
  ansible.builtin.file:
    src: "/usr/share/zoneinfo/{{ common_timezone }}"
    dest: /etc/localtime
    state: link
    force: true
  notify: reconfigure tzdata

- name: Try to apply via timedatectl (no-op on unprivileged)
  ansible.builtin.command:
    cmd: "timedatectl set-timezone {{ common_timezone }}"
  changed_when: false
  failed_when: false
