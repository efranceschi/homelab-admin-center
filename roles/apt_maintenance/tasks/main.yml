---
# Atualização de pacotes Debian/Ubuntu. Política: full-upgrade, SEM reboot.
- name: Atualizar índice de pacotes
  ansible.builtin.apt:
    update_cache: true
    cache_valid_time: 0

- name: Aplicar full-upgrade (dist-upgrade)
  ansible.builtin.apt:
    upgrade: dist
  environment:
    DEBIAN_FRONTEND: noninteractive
  register: apt_upgrade_result
  when: apt_full_upgrade | bool

- name: Remover pacotes órfãos (autoremove)
  ansible.builtin.apt:
    autoremove: true
    purge: true
  when: apt_autoremove | bool

- name: Limpar cache (autoclean)
  ansible.builtin.apt:
    autoclean: true
  when: apt_autoclean | bool
