---
# Debian/Ubuntu package updates. Policy: full-upgrade, NO reboot.
- name: Update package index
  ansible.builtin.apt:
    update_cache: true
    cache_valid_time: 0

- name: Apply full-upgrade (dist-upgrade)
  ansible.builtin.apt:
    upgrade: dist
  environment:
    DEBIAN_FRONTEND: noninteractive
  register: apt_upgrade_result
  when: apt_full_upgrade | bool

- name: Remove orphaned packages (autoremove)
  ansible.builtin.apt:
    autoremove: true
    purge: true
  when: apt_autoremove | bool

- name: Clean cache (autoclean)
  ansible.builtin.apt:
    autoclean: true
  when: apt_autoclean | bool
