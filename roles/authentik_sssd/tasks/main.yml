---
# Integrate authentication with Authentik's LDAP outpost via SSSD, keeping an
# automatic fallback to local users (nsswitch: files ... sss).
- name: Install SSSD/LDAP packages
  ansible.builtin.apt:
    name:
      - sssd
      - sssd-ldap
      - libpam-sss
      - libnss-sss
    state: present
    update_cache: true
    cache_valid_time: 3600

- name: Resolve the LDAP outpost hostname via /etc/hosts (for TLS by name)
  ansible.builtin.lineinfile:
    path: /etc/hosts
    line: "{{ authentik_ldap_hosts_entry }}"
    regexp: "{{ authentik_ldap_hosts_entry.split()[1] | regex_escape }}"
    state: present
  when:
    - authentik_ldap_hosts_entry is defined
    - authentik_ldap_hosts_entry | length > 0

- name: Install the outpost CA certificate (when provided)
  ansible.builtin.copy:
    content: "{{ authentik_ldap_ca_cert }}"
    dest: /etc/sssd/authentik-ca.crt
    owner: root
    group: root
    mode: "0644"
  when:
    - authentik_ldap_ca_cert is defined
    - authentik_ldap_ca_cert | length > 0
  notify: restart sssd

- name: Generate /etc/sssd/sssd.conf
  ansible.builtin.template:
    src: sssd.conf.j2
    dest: /etc/sssd/sssd.conf
    owner: root
    group: root
    mode: "0600" # SSSD refuses to start if it is more permissive
  notify: restart sssd

# --- NSS: ensure local fallback (files comes BEFORE sss) ---
- name: "nsswitch: passwd -> files systemd sss"
  ansible.builtin.lineinfile:
    path: /etc/nsswitch.conf
    regexp: '^passwd:'
    line: "passwd:         files systemd sss"
  notify: restart sssd

- name: "nsswitch: group -> files systemd sss"
  ansible.builtin.lineinfile:
    path: /etc/nsswitch.conf
    regexp: '^group:'
    line: "group:          files systemd sss"
  notify: restart sssd

- name: "nsswitch: shadow -> files sss"
  ansible.builtin.lineinfile:
    path: /etc/nsswitch.conf
    regexp: '^shadow:'
    line: "shadow:         files sss"
  notify: restart sssd

# --- PAM: enable sss and home creation, preserving pam_unix (fallback) ---
- name: Install pam-config profile for mkhomedir
  ansible.builtin.copy:
    src: mkhomedir
    dest: /usr/share/pam-configs/mkhomedir
    owner: root
    group: root
    mode: "0644"
  register: mkhomedir_profile

- name: Enable sss and mkhomedir PAM profiles
  ansible.builtin.command:
    cmd: pam-auth-update --package --enable sss --enable mkhomedir
  register: pam_update
  changed_when: mkhomedir_profile.changed
