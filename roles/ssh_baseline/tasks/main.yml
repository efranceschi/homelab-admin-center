---
# Padroniza o SSH via drop-in (não edita o sshd_config principal) e distribui
# a chave pública do host para habilitar o caminho de conexão SSH futuro.
- name: Instalar openssh-server
  ansible.builtin.apt:
    name: openssh-server
    state: present
    update_cache: true
    cache_valid_time: 3600

- name: Garantir diretório de drop-ins do sshd
  ansible.builtin.file:
    path: /etc/ssh/sshd_config.d
    state: directory
    owner: root
    group: root
    mode: "0755"

- name: Aplicar baseline de SSH (drop-in)
  ansible.builtin.template:
    src: 00-baseline.conf.j2
    dest: /etc/ssh/sshd_config.d/00-baseline.conf
    owner: root
    group: root
    mode: "0644"
  notify: ssh config alterada

# Aceita lista YAML (group_vars) ou texto multilinha (painel: 1 chave por linha).
- name: Normalizar lista de chaves públicas do host
  ansible.builtin.set_fact:
    ssh_host_pubkeys_list: >-
      {{
        (ssh_host_pubkeys
          if (ssh_host_pubkeys is sequence and ssh_host_pubkeys is not string)
          else (ssh_host_pubkeys | default('')).splitlines())
        | map('trim') | reject('equalto', '') | list
      }}

- name: Distribuir chaves públicas do host para root
  ansible.posix.authorized_key:
    user: root
    key: "{{ item }}"
    state: present
    exclusive: false
  loop: "{{ ssh_host_pubkeys_list }}"
  when:
    - ssh_distribute_host_key | bool
    - ssh_host_pubkeys_list | length > 0
