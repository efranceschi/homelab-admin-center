---
# Standardize SSH via a drop-in (does not edit the main sshd_config) and
# distribute the host public key to enable the future SSH connection path.
- name: Install openssh-server
  ansible.builtin.apt:
    name: openssh-server
    state: present
    update_cache: true
    cache_valid_time: 3600

- name: Ensure sshd drop-in directory exists
  ansible.builtin.file:
    path: /etc/ssh/sshd_config.d
    state: directory
    owner: root
    group: root
    mode: "0755"

- name: Apply SSH baseline (drop-in)
  ansible.builtin.template:
    src: 00-baseline.conf.j2
    dest: /etc/ssh/sshd_config.d/00-baseline.conf
    owner: root
    group: root
    mode: "0644"
  notify: ssh config changed

# Accepts a YAML list (group_vars) or multi-line text (panel: one key per line).
- name: Normalize the host public-key list
  ansible.builtin.set_fact:
    ssh_host_pubkeys_list: >-
      {{
        (ssh_host_pubkeys
          if (ssh_host_pubkeys is sequence and ssh_host_pubkeys is not string)
          else (ssh_host_pubkeys | default('')).splitlines())
        | map('trim') | reject('equalto', '') | list
      }}

- name: Distribute host public keys to root
  ansible.posix.authorized_key:
    user: root
    key: "{{ item }}"
    state: present
    exclusive: false
  loop: "{{ ssh_host_pubkeys_list }}"
  when:
    - ssh_distribute_host_key | bool
    - ssh_host_pubkeys_list | length > 0
