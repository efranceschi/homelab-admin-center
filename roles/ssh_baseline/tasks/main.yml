---
# Padroniza o SSH via drop-in (não edita o sshd_config principal) e distribui
# a chave pública do host para habilitar o caminho de conexão SSH futuro.
- name: Instalar openssh-server
  ansible.builtin.apt:
    name: openssh-server
    state: present
    update_cache: true
    cache_valid_time: 3600

- name: Garantir diretório de drop-ins do sshd
  ansible.builtin.file:
    path: /etc/ssh/sshd_config.d
    state: directory
    owner: root
    group: root
    mode: "0755"

- name: Aplicar baseline de SSH (drop-in)
  ansible.builtin.template:
    src: 00-baseline.conf.j2
    dest: /etc/ssh/sshd_config.d/00-baseline.conf
    owner: root
    group: root
    mode: "0644"
  notify: ssh config alterada

- name: Distribuir chave pública do host para root
  ansible.posix.authorized_key:
    user: root
    key: "{{ lookup('ansible.builtin.file', ssh_host_pubkey_path) }}"
    state: present
    exclusive: false
  when: ssh_distribute_host_key | bool
