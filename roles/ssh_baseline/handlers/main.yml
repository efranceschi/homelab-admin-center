---
# Notified via `listen` to guarantee order: validate BEFORE restarting.
- name: Validate sshd configuration
  ansible.builtin.command:
    cmd: sshd -t
  changed_when: false
  listen: ssh config changed

- name: Restart ssh service
  ansible.builtin.service:
    name: ssh
    state: restarted
  listen: ssh config changed
  # Skip during --check: a dry run shouldn't restart services, and on a host
  # where openssh-server would be newly installed the unit isn't there yet.
  when: not ansible_check_mode
